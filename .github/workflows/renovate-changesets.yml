name: Renovate Changesets

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: renovate-changesets-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  add-changeset:
    name: Add changeset for Renovate PR
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        github.event.pull_request.user.login == 'renovate[bot]' ||
        github.event.pull_request.user.login == 'mend-renovate[bot]' ||
        github.actor == 'renovate[bot]' ||
        github.actor == 'mend-renovate[bot]'
      )
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@7bd03711494f032dfa3be3558f7dc8787b0be333 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Bun Environment
        uses: ./.github/actions/setup-bun-env
        with:
          turbo-cache: 'false'

      - name: Generate changeset (if needed)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bun scripts/renovate-generate-changeset.ts

      - name: Commit and push changeset
        run: |
          if [ -z "$(git status --porcelain .changeset)" ]; then
            echo "No changeset created; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .changeset/*.md
          git commit -m "chore(changeset): add renovate deps changeset"
          git push
