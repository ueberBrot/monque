name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'apps/docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'apps/docs/**'
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Setup Bun Environment
        uses: ./.github/actions/setup-bun-env

      - name: Lint & Type Check
        run: bun turbo lint type-check

  test:
    name: Test & Coverage
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref || 'main' }}:${{ github.base_ref || 'main' }}

      - name: Setup Bun Environment
        uses: ./.github/actions/setup-bun-env

      - name: Run Tests
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            bun turbo test --filter="...[${{ github.base_ref }}]"
          else
            bun turbo test
          fi

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    name: Build
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Setup Bun Environment
        uses: ./.github/actions/setup-bun-env

      - name: Build
        run: bun run build

      - name: Check Exports
        run: bun turbo check:exports

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: build-artifacts
          path: packages/*/dist
          retention-days: 1

  check-changeset:
    name: Check Changeset
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - name: Check Changeset
        run: echo "Skipping changeset status check"
