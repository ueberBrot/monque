name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Decide whether to deploy
        id: decide
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            if [ -d .changeset ]; then
              COUNT=$(find .changeset -name "*.md" ! -name "README.md" | wc -l | xargs)
              if [ "$COUNT" -eq "0" ]; then
                echo "should_deploy=true" >> $GITHUB_OUTPUT
              else
                echo "Pending changesets found. Documentation will be updated on release."
                echo "should_deploy=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "should_deploy=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Setup Bun Environment
        if: steps.decide.outputs.should_deploy == 'true'
        uses: ./.github/actions/setup-bun-env

      - name: Build packages
        if: steps.decide.outputs.should_deploy == 'true'
        run: bun run build

      - name: Install, build, and upload docs
        if: steps.decide.outputs.should_deploy == 'true'
        uses: withastro/action@74d664f13f9f9063e37b49d74a74613dbf94db3c # v6
        with:
          path: ./apps/docs
          package-manager: bun@1.3.10

  deploy:
    needs: build
    if: needs.build.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Docs to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
